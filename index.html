<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        body {
            /* 居中布局与留白 */
            max-width: 600px;
            margin: 0 auto;
            padding: 15vh 5vw;
            /* 极简排版与色彩 */
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #1a1a1a;
            background-color: #ffffff;
            line-height: 1.6;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: normal;
            margin-bottom: 2rem;
        }
        h2 {
            font-size: 1rem;
            font-weight: normal;
            color: #666;
            margin-top: 3rem;
            margin-bottom: 1rem;
        }
        /* 超链接交互 */
        a {
            color: #1a1a1a;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s ease, opacity 0.3s ease;
        }
        a:hover {
            opacity: 0.6;
            border-bottom: 1px solid #1a1a1a;
        }
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        li {
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Menghan (Rex) Jiang</h1>
        <p>Musician/digital artist.</p>
    </header>

    <main>
        <section>
            <h2>Selected Works</h2>
            <ul>
                <li><a href="#">Texture No.1</a> — Fixed-media.</li>
                <li><a href="#">Tinnitus</a> — Fixed-media.</li>
            </ul>
        </section>
    </main>

    <footer>
        <h2>Contact</h2>

    </footer>

</body>
</html>
